{% extends "base.html" %}

{% block title %}Редактирование {{ car }} — ВинАвто{% endblock %}
{% block page_title %}Редактирование авто{% endblock %}

{% block content %}
<div class="page-header">
    <h1>Редактирование: {{ car.brand }} {{ car.model }}</h1>
    <a href="{% url 'cars_list' %}" class="btn btn-secondary">← Назад</a>
</div>

<div class="glass-card" style="max-width: 600px;">
    <form method="post">
        {% csrf_token %}
        <div class="form-group">
            <label class="form-label">Владелец (Клиент) *</label>
            <select name="client" class="form-select" required>
                {% for c in clients %}
                <option value="{{ c.pk }}" {% if c.pk == car.client_id %}selected{% endif %}>{{ c.name }}</option>
                {% endfor %}
            </select>
        </div>
        <div style="display:grid; grid-template-columns:1fr 1fr; gap:16px;">
            <div class="form-group">
                <label class="form-label">Марка *</label>
                <input type="text" name="brand" class="form-input" value="{{ car.brand }}" required>
            </div>
            <div class="form-group">
                <label class="form-label">Модель *</label>
                <input type="text" name="model" class="form-input" value="{{ car.model }}" required>
            </div>
        </div>
        <div style="display:grid; grid-template-columns:1fr 1fr; gap:16px;">
            <div class="form-group">
                <label class="form-label">Год *</label>
                <input type="number" name="year" class="form-input" value="{{ car.year }}" required>
            </div>
            <div class="form-group">
                <label class="form-label">Цвет</label>
                <input type="text" name="color" class="form-input" value="{{ car.color }}">
            </div>
        </div>
        <div class="form-group">
            <label class="form-label">Гос. номер *</label>
            <input type="text" name="license_plate" class="form-input" value="{{ car.license_plate }}" required>
        </div>
        <div class="form-group">
            <label class="form-label">VIN</label>
            <input type="text" name="vin" class="form-input" value="{{ car.vin }}" maxlength="17">
        </div>
        <div class="form-group">
            <label class="form-label">Пробег (км)</label>
            <input type="number" name="mileage" class="form-input" value="{{ car.mileage }}">
        </div>
        <button type="submit" class="btn btn-primary btn-lg">Сохранить</button>
    </form>
</div>
{% endblock %}
