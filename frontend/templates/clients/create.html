{% extends "base.html" %}

{% block title %}Добавить клиента — ВинАвто{% endblock %}
{% block page_title %}Добавить клиента{% endblock %}

{% block content %}
<div class="page-header">
    <h1>Новый клиент</h1>
    <a href="{% url 'clients_list' %}" class="btn btn-secondary">← Назад</a>
</div>

<div class="glass-card" style="max-width: 600px;">
    <form method="post">
        {% csrf_token %}
        <div class="form-group">
            <label class="form-label">ФИО *</label>
            <input type="text" name="name" class="form-input" placeholder="Иванов Иван" required>
        </div>
        <div class="form-group">
            <label class="form-label">Телефон *</label>
            <input type="text" name="phone" class="form-input" placeholder="+7 999 123 45 67" required>
        </div>
        <div class="form-group">
            <label class="form-label">Email</label>
            <input type="email" name="email" class="form-input" placeholder="client@example.com">
        </div>
        <div class="form-group">
            <label class="form-label">Адрес</label>
            <textarea name="address" class="form-textarea" rows="2" placeholder="Улица, город..."></textarea>
        </div>
        <div class="form-group">
            <label class="form-label">Заметки</label>
            <textarea name="notes" class="form-textarea" rows="2" placeholder="Дополнительные заметки..."></textarea>
        </div>
        <button type="submit" class="btn btn-primary btn-lg">Создать клиента</button>
    </form>
</div>
{% endblock %}
