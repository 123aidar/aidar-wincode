{% extends "base.html" %}

{% block title %}Добавить услугу — ВинАвто{% endblock %}
{% block page_title %}Добавить услугу{% endblock %}

{% block content %}
<div class="page-header">
    <h1>Новая услуга</h1>
    <a href="{% url 'services_list' %}" class="btn btn-secondary">← Назад</a>
</div>

<div class="glass-card" style="max-width: 600px;">
    <form method="post">
        {% csrf_token %}
        <div class="form-group">
            <label class="form-label">Название услуги *</label>
            <input type="text" name="name" class="form-input" placeholder="Замена масла" required>
        </div>
        <div class="form-group">
            <label class="form-label">Описание</label>
            <textarea name="description" class="form-textarea" rows="3" placeholder="Подробное описание..."></textarea>
        </div>
        <div style="display:grid; grid-template-columns:1fr 1fr; gap:16px;">
            <div class="form-group">
                <label class="form-label">Цена (₽) *</label>
                <input type="number" name="price" class="form-input" step="0.01" placeholder="49.99" required>
            </div>
            <div class="form-group">
                <label class="form-label">Длительность (минуты)</label>
                <input type="number" name="duration_minutes" class="form-input" value="60" min="1">
            </div>
        </div>
        <button type="submit" class="btn btn-primary btn-lg">Создать услугу</button>
    </form>
</div>
{% endblock %}
