{% extends "base.html" %}

{% block title %}Добавить поставщика — ВинАвто{% endblock %}
{% block page_title %}Добавить поставщика{% endblock %}

{% block content %}
<div class="page-header">
    <h1>Новый поставщик</h1>
    <a href="{% url 'suppliers_list' %}" class="btn btn-secondary">← Назад</a>
</div>

<div class="glass-card" style="max-width: 600px;">
    <form method="post">
        {% csrf_token %}
        <div class="form-group">
            <label class="form-label">Название компании *</label>
            <input type="text" name="name" class="form-input" required>
        </div>
        <div class="form-group">
            <label class="form-label">Контактное лицо</label>
            <input type="text" name="contact_person" class="form-input">
        </div>
        <div style="display:grid; grid-template-columns:1fr 1fr; gap:16px;">
            <div class="form-group">
                <label class="form-label">Телефон *</label>
                <input type="text" name="phone" class="form-input" placeholder="+7 (999) 999-99-99" required>
            </div>
            <div class="form-group">
                <label class="form-label">Email</label>
                <input type="email" name="email" class="form-input">
            </div>
        </div>
        <div class="form-group">
            <label class="form-label">Адрес</label>
            <textarea name="address" class="form-textarea" rows="2"></textarea>
        </div>
        <div class="form-group">
            <label class="form-label">Заметки</label>
            <textarea name="notes" class="form-textarea" rows="2"></textarea>
        </div>
        <button type="submit" class="btn btn-primary btn-lg">Добавить</button>
    </form>
</div>
{% endblock %}
