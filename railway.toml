[build]
builder = "nixpacks"
buildCommand = "pip install -r requirements.txt && cd backend && python manage.py collectstatic --noinput"

[deploy]
startCommand = "cd backend && python manage.py migrate --noinput && python manage.py seed_data 2>/dev/null; gunicorn config.wsgi:application --bind 0.0.0.0:$PORT --workers 2"
restartPolicyType = "on_failure"
